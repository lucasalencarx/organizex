<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Organize - Login</title>

<link rel="icon"
type="image/x-icon"
href="assets/fav-icon/favicon.ico">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-box">

  <div class="logo">

 

    <h1>Entrar</h1>

 

  </div>

  <form>

    <div class="input-group">

      <label>Email</label>

      <div class="input-box">

        <i class="fa-solid fa-envelope"></i>

        <input
        type="email"
        id="email"
        placeholder="Digite seu email"
        required>

      </div>

    </div>

    <div class="input-group">

      <label>Senha</label>

      <div class="input-box">

        <i class="fa-solid fa-lock"></i>

        <input
        type="password"
        id="senha"
        placeholder="Digite sua senha"
        required>

      </div>

    </div>

    <div
    class="toggle"
    onclick="toggleSenha()">

      👁 Mostrar senha

    </div>

    <button
    type="button"
    id="loginBtn"
    onclick="login()">

      <span id="btnText">
        Entrar
      </span>

      <span
      id="spinner"
      class="spinner hidden">

      </span>

    </button>

  </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="script.js"></script>

</body>
</html>
